<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard | SevaLog</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="../public-layout.css">
    <link rel="stylesheet" href="volunteer-layout.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <i data-lucide="heart" style="color: var(--accent-primary);"></i>
            SevaLog
        </div>
        <nav class="sidebar-nav">
            <a href="volunteer/dashboard.html" class="nav-item active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="my-events.html" class="nav-item"><i data-lucide="calendar"></i> My Events</a>
            <a href="community.html" class="nav-item"><i data-lucide="users"></i> Community Hub</a>
            <a href="documents.html" class="nav-item"><i data-lucide="file-text"></i> Documents</a>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-light);">
                <a href="settings.html" class="nav-item"><i data-lucide="settings"></i> Settings</a>
                <a href="#" id="logout-btn" class="nav-item" style="color: #EF4444;"><i data-lucide="log-out"></i> Log Out</a>
            </div>
        </nav>
    </aside>

    <div class="app-content">
        <header class="top-bar">
            <button id="mobile-menu-btn" class="icon-btn mobile-menu-btn" aria-label="Open navigation"><i data-lucide="menu"></i></button>
            <div class="page-title">
                <h3 id="welcome-text">Loading Dashboard...</h3>
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="icon-btn"><i data-lucide="bell"></i></button>
                <div class="user-profile-menu">
                    <div class="avatar" id="user-initial">U</div>
                    <span id="user-name-top" style="font-weight: 700; font-size: 14px;">User</span>
                </div>
            </div>
        </header>

        <main class="main-viewport">
            
            <div class="impact-hero-panel reveal">
                <div class="hero-glow-1"></div>
                <div class="hero-glow-2"></div>
                
                <div class="impact-content">
                    <div class="impact-info">
                        <div class="rank-badge">
                            <i data-lucide="shield"></i> 
                            <span id="stat-rank">Rising Star</span>
                        </div>
                        <h2>Your Global Impact</h2>
                        
                        <div class="big-stats-container">
                            <div class="stat-group">
                                <span class="stat-value" id="stat-hours">0</span>
                                <span class="stat-label">Total Hours</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-group">
                                <span class="stat-value" id="stat-count">0</span>
                                <span class="stat-label">Activities</span>
                            </div>
                        </div>
                    </div>

                    <div class="impact-progress">
                        <div class="progress-ring-container">
                            <svg class="progress-ring" width="140" height="140">
                                <circle class="ring-track" stroke-width="8" fill="transparent" r="62" cx="70" cy="70"/>
                                <circle class="ring-fill" id="milestone-ring" stroke-width="8" fill="transparent" r="62" cx="70" cy="70"/>
                            </svg>
                            <div class="progress-text">
                                <span id="hours-left" style="font-size: 24px; font-weight: 800; color: white;">--</span>
                                <small style="color: rgba(255,255,255,0.8); font-weight: 600;">Hrs to Next Rank</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dashboard-main-grid">
                <div class="dashboard-col">
                    <section class="dashboard-box">
                        <div class="box-header">
                            <h4>Upcoming Events</h4>
                            <a href="my-events.html">View All</a>
                        </div>
                        <div id="upcoming-events-list">
                            <p class="empty-msg">There are no upcoming events yet.</p>
                        </div>
                    </section>

                    <section class="dashboard-box">
                        <div class="box-header">
                            <h4>Suggested for You</h4>
                        </div>
                        <div id="suggested-events-list">
                            </div>
                    </section>
                </div>

                <div class="dashboard-col">
                    <section class="dashboard-box">
                        <div class="box-header">
                            <h4>Community Feed</h4>
                        </div>
                        <div id="community-feed" class="feed-container">
                            </div>
                    </section>

                    <section class="dashboard-box">
                        <div class="box-header">
                            <h4>Global Leaderboard</h4>
                        </div>
                        <div id="global-mini-leaderboard">
                            </div>
                    </section>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../public-main.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
