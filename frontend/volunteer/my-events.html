<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events | SevaLog</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="../public-layout.css">
    <link rel="stylesheet" href="volunteer-layout.css">
    <link rel="stylesheet" href="my-events.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><i data-lucide="heart" style="color: var(--accent-primary);"></i> SevaLog</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="my-events.html" class="nav-item active"><i data-lucide="calendar"></i> My Events</a>
            <a href="community.html" class="nav-item"><i data-lucide="users"></i> Community Hub</a>
            <a href="documents.html" class="nav-item"><i data-lucide="file-text"></i> Documents</a>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-light);">
                <a href="settings.html" class="nav-item"><i data-lucide="settings"></i> Settings</a>
                <a href="#" id="logout-btn" class="nav-item" style="color: #EF4444;"><i data-lucide="log-out"></i> Log Out</a>
            </div>
        </nav>
    </aside>

    <div class="app-content">
        <header class="top-bar">
            <button id="mobile-menu-btn" class="icon-btn mobile-menu-btn" aria-label="Open navigation"><i data-lucide="menu"></i></button>
            <div class="page-title"><h3>My Schedule</h3></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="icon-btn"><i data-lucide="bell"></i></button>
                <div class="user-profile-menu">
                    <div class="avatar" id="user-initial">U</div>
                    <span id="user-name-top" style="font-weight: 700; font-size: 14px;">User</span>
                </div>
            </div>
        </header>

        <main class="main-viewport">
            
            <div class="events-container">
                <div class="tab-header">
                    <button class="tab-btn active" data-target="upcoming-tab">Upcoming Seva</button>
                    <button class="tab-btn" data-target="past-tab">Past Events</button>
                </div>

                <div class="tab-content active" id="upcoming-tab">
                    <div class="ticket-grid" id="upcoming-grid">
                        <div class="loading-state"><i data-lucide="loader-2" class="spin"></i> Loading schedule...</div>
                    </div>
                </div>

                <div class="tab-content" id="past-tab">
                    <div class="ticket-grid" id="past-grid">
                        </div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../public-main.js"></script>
    <script src="my-events.js"></script>
</body>
</html>
